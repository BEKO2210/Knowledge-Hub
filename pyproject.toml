[tool.ruff]
line-length = 110
target-version = "py312"
exclude = [".venv", "graphify-out", "build-logs", "web", ".pypackages", ".firma"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",    # Zeilenlänge: von line-length abgedeckt, doppelte Meldung
    "B008",    # Starlette-Handler nehmen Defaults aus Aufrufen entgegen
    "SIM105",  # try/except/pass ist hier bewusst und lesbarer als contextlib.suppress
]

[tool.ruff.lint.per-file-ignores]
# Die Tests dürfen Interna anfassen — genau das ist ihr Job.
"tests/*" = ["E402", "SIM117"]
# conftest MUSS die Umgebung vor den Importen setzen.
"tests/conftest.py" = ["E402"]


# Coverage/Codecov ist bewusst NICHT eingebunden.
# coverage bricht mit einem Zirkelimport ab, sobald es misst: Der Import-Hook von
# beartype (kommt über key_value.aio aus fastmcp) umschließt den Loader von coverage
# und ruft sich dabei selbst auf. Getestet mit beartype 0.21 und 0.22 — beide betroffen.
# Sobald das behoben ist, reichen pytest-cov + ein Upload-Schritt in ci.yml.
