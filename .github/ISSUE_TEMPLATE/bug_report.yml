name: Bug report
description: Something is broken. Tell us what, and how to see it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not report security holes here.** Use **Security → Report a vulnerability** —
        that channel is private. See [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: |
        1. Opened the Mapping tab
        2. Clicked "Run now"
        3. Expected the run to start; instead nothing happened and no error appeared.
    validations:
      required: true

  - type: input
    id: reference
    attributes:
      label: Reference number
      description: >
        If the interface showed you a red banner, it carried a reference (e.g. `7f3a91c2`).
        That number maps to a full stack trace in your `errors.log` — it is the single most
        useful thing you can give us.
      placeholder: 7f3a91c2

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: >
        Open **More → Diagnostics** and paste what is not green (or attach a screenshot).
        Redact anything you consider private — we do not need your paths or URLs.
      render: text

  - type: input
    id: version
    attributes:
      label: Version
      description: The contents of the VERSION file, or the commit you are on.
      placeholder: 0.5.0
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - install.sh (systemd)
        - Docker
        - From source, manually
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        `journalctl --user -u knowledge-mcp -n 50` (systemd) or `docker compose logs --tail 50`.
        **Check it for secrets before pasting.**
      render: shell
