# Knowledge Hub — Docker-Variante
#
#   docker compose up -d          # startet den Hub
#   → http://localhost:8300/ui    # Einrichtungs-Assistent im Browser
#
# Alles Dauerhafte (Konfiguration, Vault, Wissensgraphen, Notizen) liegt im Volume `hub-data`.
# Deine Projekte werden eingehängt — der Hub analysiert sie und schreibt beim
# Mapping-Build jeweils einen Ordner `graphify-out/` in den Projektordner.

services:
  knowledge-hub:
    build: .
    image: knowledge-hub:latest
    container_name: knowledge-hub
    restart: unless-stopped

    # In den Container muss der Server auf allen Adressen lauschen; nach außen
    # veröffentlichen wir ihn trotzdem nur auf localhost (davor gehört ein Proxy).
    environment:
      - KNOWLEDGE_HOST=0.0.0.0
    ports:
      - "127.0.0.1:8300:8300"

    volumes:
      - hub-data:/data
      # Mount your own projects here (read-write). Example:
      # - /srv/projects/payments-api:/projects/payments-api
      # - /srv/projects/web-storefront:/projects/web-storefront
      # WICHTIG: Der Mapping-Build schreibt `graphify-out/` IN den Projektordner —
      # ein `:ro`-Mount lässt jeden Build am Projekt scheitern (read-only filesystem).
      # Wer Projekte nur lesen lassen will, mountet :ro und führt das Mapping
      # dann auf dem Host statt im Container aus.
      - ./projects:/projects

    # Das Image enthält KEINEN Cron — der Nacht-Job läuft NICHT automatisch im
    # Container. Extern einrichten, z. B. per Host-Cron oder systemd-Timer:
    #   docker compose exec knowledge-hub /app/nightly-map.sh

volumes:
  hub-data:
